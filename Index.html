<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator</title>
    <!-- Menggunakan CDN QRCode.js yang stabil -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: #ffffff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h2 {
            color: #333;
            margin-bottom: 20px;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            outline: none;
            font-size: 16px;
            transition: border-color 0.3s;
            margin-bottom: 20px;
        }

        input[type="text"]:focus {
            border-color: #007bff;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background: #0056b3;
        }

        #qrcode {
            margin-top: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 200px;
        }

        /* Memastikan gambar QR code pas di dalam kontainer */
        #qrcode img {
            border: 4px solid #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            border-radius: 8px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>QR Code Generator</h2>
    <input type="text" id="text-input" placeholder="Masukkan teks atau URL di sini...">
    <button onclick="generateQR()">Buat QR Code</button>
    
    <!-- Tempat QR Code akan muncul -->
    <div id="qrcode"></div>
</div>

<script>
    // Inisialisasi variabel QR global agar bisa di-clear sebelum membuat yang baru
    let qrcode = null;

    function generateQR() {
        const input = document.getElementById("text-input").value.trim();
        const qrContainer = document.getElementById("qrcode");

        // Validasi jika input kosong
        if (input === "") {
            alert("Tolong masukkan teks atau URL terlebih dahulu!");
            return;
        }

        // Hapus QR code yang lama jika ada
        qrContainer.innerHTML = "";

        // Buat QR code baru
        qrcode = new QRCode(qrContainer, {
            text: input,
            width: 200,
            height: 200,
            colorDark : "#000000",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H
        });
    }
</script>

</body>
</html>
